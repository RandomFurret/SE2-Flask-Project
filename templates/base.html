<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<style>
nav p {
    color: antiquewhite;
    font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    text-align: center;
    position: absolute;
    margin-right: 25px;
    left: 750px;
    top: 7px;
    font-size: larger;
}

nav input[type=text]{
    text-align: left;
    top: 100px;
    padding: 5px;
    left: 500px;
    margin-top: 45px;
    
}

nav{
    height: 100px;
    background-color: cadetblue;

}
</style>

<body>

    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('about') }}">About</a>
        <p>PastryPlanner</p>
        <input type="text" placeholder="Search..">
    </nav>

    <hr>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
